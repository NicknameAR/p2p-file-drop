<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FileServer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/styles.css">
</head>

<body class="bg-gray-950 text-gray-200 min-h-screen">

<div class="max-w-5xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-semibold tracking-tight">FileServer</h1>
            <p class="text-gray-400 text-sm mt-1">Secure local file sharing</p>
        </div>

        <div class="flex items-center gap-4">
            <span class="text-xs px-3 py-1 rounded-full bg-green-900 text-green-400">
                ● Online
            </span>

            <button onclick="logout()" 
                class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg text-sm font-medium transition">
                Logout
            </button>
        </div>
    </div>

    <!-- Main Card -->
    <div class="glass p-8 rounded-2xl shadow-2xl fade-in">

        <!-- Upload Section -->
        <div id="dropzone"
            class="border-2 border-dashed border-gray-700 hover:border-blue-500 
                   p-12 text-center rounded-xl cursor-pointer transition relative">

            <div class="space-y-3">
                <div class="text-4xl">⬆</div>
                <p class="text-lg font-medium">Upload File</p>
                <p class="text-sm text-gray-400">
                    Drag & drop file here or click to select
                </p>
            </div>

            <input type="file" id="fileInput" hidden>
        </div>

        <!-- Progress Bar -->
        <div class="mt-6 hidden" id="progressContainer">
            <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
                <div id="progressBar"
                     class="h-full bg-blue-500 w-0 transition-all duration-300">
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="my-10 border-t border-gray-800"></div>

        <!-- File List Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Files</h2>
            <span id="fileCount" class="text-sm text-gray-400"></span>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 text-gray-500 hidden">
            <div class="text-5xl mb-4">📂</div>
            <p>No files uploaded yet</p>
        </div>

        <!-- File List -->
        <div id="files" class="space-y-3"></div>

    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"
     class="fixed bottom-6 right-6 space-y-3 z-50"></div>

<script src="app.js"></script>
</body>
</html>
